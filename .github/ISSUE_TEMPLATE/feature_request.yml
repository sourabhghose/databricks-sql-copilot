name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Help us understand the use case.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What workflow would it improve?
      placeholder: "As a platform admin, I want to ... so that ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Query Discovery / Triage
        - AI Diagnosis / Rewrite
        - Warehouse Monitoring
        - Dashboard / UI
        - Deployment / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, or references.
