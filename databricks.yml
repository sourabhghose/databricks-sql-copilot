bundle:
  name: sql-observability-copilot

include:
  - resources/*.yml

variables:
  warehouse_id:
    description: "SQL warehouse ID for the target workspace"
    default: ""
  auth_mode:
    description: "Authentication mode: 'obo' (on-behalf-of user) or 'sp' (service principal)"
    default: "obo"
  genie_space_id:
    description: "Genie Space ID (create one per workspace, leave empty to disable)"
    default: ""

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      warehouse_id: "75fd8278393d07eb"
      auth_mode: "sp"
      genie_space_id: "01f11d330b1e17349370616c86cb90ba"

  alinta-prod:
    workspace:
      profile: alinta_prod_user
    variables:
      warehouse_id: "bfe02b96b14128c0"
      auth_mode: "obo"
      genie_space_id: "01f11dc201071ef782dbdea63e487090"
